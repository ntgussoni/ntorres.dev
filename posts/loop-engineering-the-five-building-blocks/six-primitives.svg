<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="600" y="56" text-anchor="middle" fill="#1f2937" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">Six Primitives</text>
  <text x="600" y="86" text-anchor="middle" fill="#737373" font-family="Inter, system-ui, sans-serif" font-size="15">Five capabilities orbit STATE.md, the durable memory spine</text>

  <!-- spokes to center -->
  <line x1="600" y1="198" x2="600" y2="318" stroke="#f97316" stroke-width="2.5"/>
  <line x1="798" y1="278" x2="688" y2="352" stroke="#f97316" stroke-width="2.5"/>
  <line x1="858" y1="460" x2="688" y2="448" stroke="#f97316" stroke-width="2.5"/>
  <line x1="342" y1="460" x2="512" y2="448" stroke="#f97316" stroke-width="2.5"/>
  <line x1="402" y1="278" x2="512" y2="352" stroke="#f97316" stroke-width="2.5"/>

  <!-- outer dashed cycle -->
  <path d="M600 148 c120 0 210 90 210 210 s-90 210-210 210-210-90-210-210 90-210 210-210" stroke="#fdba74" stroke-width="2" stroke-dasharray="8 6" fill="none"/>
  <path d="M798 278 c70 40 70 120 30 170" stroke="#fdba74" stroke-width="2" stroke-dasharray="8 6" fill="none" marker-end="url(#arr)"/>
  <path d="M858 460 c-40 70-120 90-190 70" stroke="#fdba74" stroke-width="2" stroke-dasharray="8 6" fill="none" marker-end="url(#arr)"/>
  <path d="M342 460 c40 70 120 90 190 70" stroke="#fdba74" stroke-width="2" stroke-dasharray="8 6" fill="none" marker-end="url(#arr)"/>
  <path d="M402 278 c-70 40-70 120-30 170" stroke="#fdba74" stroke-width="2" stroke-dasharray="8 6" fill="none" marker-end="url(#arr)"/>
  <path d="M600 148 c-120 0-210 90-210 210" stroke="#fdba74" stroke-width="2" stroke-dasharray="8 6" fill="none" marker-end="url(#arr)"/>

  <!-- center STATE.md -->
  <circle cx="600" cy="400" r="82" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <rect x="562" y="362" width="36" height="44" rx="4" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <path d="M568 374 h24 M568 384 h18 M568 394 h22" stroke="#f97316" stroke-width="2"/>
  <text x="600" y="430" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">STATE.md</text>
  <text x="600" y="450" text-anchor="middle" fill="#ea580c" font-family="Inter, system-ui, sans-serif" font-size="13">(Memory)</text>

  <!-- 1 Scheduling top -->
  <circle cx="600" cy="148" r="52" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/>
  <text x="600" y="118" text-anchor="middle" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">1</text>
  <rect x="578" y="132" width="44" height="34" rx="4" fill="none" stroke="#f97316" stroke-width="2"/>
  <circle cx="612" cy="142" r="4" fill="#f97316"/>
  <text x="600" y="218" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Automations</text>
  <text x="600" y="236" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">/ Schedule</text>

  <!-- 2 Worktrees -->
  <circle cx="858" cy="248" r="52" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/>
  <text x="858" y="218" text-anchor="middle" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">2</text>
  <path d="M836 248 h44 v24 h-44z" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="858" y="318" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Worktrees</text>

  <!-- 3 Skills -->
  <circle cx="918" cy="460" r="52" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/>
  <text x="918" y="430" text-anchor="middle" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">3</text>
  <path d="M900 452 c8-16 28-16 36 0-10 8-10 20 0 28-10 8-26 8-36 0z" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="918" y="530" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Skills</text>

  <!-- 4 Connectors -->
  <circle cx="600" cy="612" r="52" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/>
  <text x="600" y="582" text-anchor="middle" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">4</text>
  <path d="M580 612 h40 M600 592 v40" stroke="#f97316" stroke-width="2.5"/>
  <circle cx="580" cy="592" r="5" fill="none" stroke="#f97316" stroke-width="2"/>
  <circle cx="620" cy="632" r="5" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="600" y="682" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Connectors / MCP</text>

  <!-- 5 Sub-agents -->
  <circle cx="282" cy="460" r="52" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/>
  <text x="282" y="430" text-anchor="middle" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">5</text>
  <rect x="260" y="446" width="44" height="30" rx="8" fill="none" stroke="#f97316" stroke-width="2"/>
  <circle cx="272" cy="458" r="3" fill="#f97316"/><circle cx="292" cy="458" r="3" fill="#f97316"/>
  <text x="282" y="530" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Sub-agents</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#fdba74"/>
    </marker>
  </defs>
</svg>
