<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" fill="none">
  <rect width="1200" height="560" fill="#ffffff"/>

  <text x="600" y="48" text-anchor="middle" fill="#1f2937" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700">The Old Way vs The Loop</text>

  <!-- LEFT PANEL -->
  <rect x="48" y="80" width="520" height="440" rx="16" stroke="#fdba74" stroke-width="3" fill="#fffbf7"/>
  <rect x="48" y="80" width="520" height="56" rx="16" fill="#f97316"/>
  <rect x="48" y="120" width="520" height="16" fill="#f97316"/>
  <text x="308" y="116" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">You prompt</text>
  <text x="308" y="158" text-anchor="middle" fill="#9a3412" font-family="Inter, system-ui, sans-serif" font-size="14">You hold the agent on every turn</text>

  <!-- You box -->
  <circle cx="170" cy="280" r="44" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <circle cx="170" cy="262" r="10" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <path d="M150 292 c0-14 40-14 40 0 v14 h-40z" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <text x="170" y="348" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">You</text>

  <!-- Agent box -->
  <circle cx="446" cy="280" r="44" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <rect x="424" y="262" width="44" height="34" rx="10" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <circle cx="436" cy="276" r="4" fill="#f97316"/>
  <circle cx="456" cy="276" r="4" fill="#f97316"/>
  <path d="M432 290 h32" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <text x="446" y="348" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">agent</text>

  <!-- prompt arrow -->
  <path d="M214 268 H392" stroke="#f97316" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <rect x="268" y="236" width="72" height="24" rx="6" fill="#ffedd5"/>
  <text x="304" y="253" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">prompt</text>

  <!-- output arrow -->
  <path d="M402 292 H224" stroke="#f97316" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <rect x="248" y="300" width="132" height="24" rx="6" fill="#ffedd5"/>
  <text x="314" y="317" text-anchor="middle" fill="#c2410c" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">output, read, repeat</text>

  <!-- repeat arc -->
  <path d="M170 324 c-8 56 252 56 276 0" stroke="#fdba74" stroke-width="2.5" stroke-dasharray="7 6" fill="none" marker-end="url(#arrow-orange-light)"/>

  <text x="308" y="410" text-anchor="middle" fill="#9a3412" font-family="Inter, system-ui, sans-serif" font-size="14">Same rhythm every turn. The ceiling is you.</text>

  <!-- RIGHT PANEL -->
  <rect x="632" y="80" width="520" height="440" rx="16" stroke="#fca5a5" stroke-width="3" fill="#fffbfb"/>
  <rect x="632" y="80" width="520" height="56" rx="16" fill="#ef4444"/>
  <rect x="632" y="120" width="520" height="16" fill="#ef4444"/>
  <text x="892" y="116" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">You design</text>
  <text x="892" y="158" text-anchor="middle" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="14">Design once, then the system runs</text>

  <!-- You (design once) -->
  <circle cx="710" cy="230" r="36" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
  <circle cx="710" cy="216" r="8" fill="none" stroke="#ef4444" stroke-width="2"/>
  <path d="M694 242 c0-12 32-12 32 0 v10 h-32z" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="710" y="284" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">You</text>

  <path d="M746 226 H812" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="778" y="218" text-anchor="middle" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">design</text>
  <text x="778" y="244" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="10">(once)</text>

  <!-- Loop cycle center -->
  <circle cx="1010" cy="300" r="148" fill="none" stroke="#fecaca" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- Step icons around circle - clockwise from top -->
  <!-- discover work -->
  <circle cx="1010" cy="168" r="34" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="1010" cy="168" r="12" fill="none" stroke="#ef4444" stroke-width="2"/>
  <path d="M1022 180 l10 10" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="1010" y="218" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">discover</text>
  <text x="1010" y="232" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">work</text>

  <!-- assign agent -->
  <circle cx="1144" cy="260" r="34" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
  <rect x="1128" y="246" width="32" height="26" rx="7" fill="none" stroke="#ef4444" stroke-width="2"/>
  <circle cx="1138" cy="256" r="3" fill="#ef4444"/>
  <circle cx="1150" cy="256" r="3" fill="#ef4444"/>
  <text x="1144" y="310" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">assign</text>
  <text x="1144" y="324" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">agent</text>

  <!-- verifier -->
  <circle cx="1100" cy="410" r="34" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
  <path d="M1088 410 h24 l-6 10 6 10 h-24 l6-10z" fill="none" stroke="#ef4444" stroke-width="2"/>
  <path d="M1096 410 l4 4 8-8" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <text x="1100" y="460" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">verifier</text>
  <text x="1100" y="474" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">checks</text>

  <!-- write STATE -->
  <circle cx="920" cy="410" r="34" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
  <rect x="904" y="396" width="32" height="28" rx="4" fill="none" stroke="#ef4444" stroke-width="2"/>
  <path d="M910 404 h20 M910 410 h14 M910 416 h18" stroke="#ef4444" stroke-width="1.5"/>
  <text x="920" y="460" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">writes</text>
  <text x="920" y="474" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">STATE</text>

  <!-- repeats -->
  <circle cx="876" cy="260" r="34" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
  <path d="M864 260 a12 12 0 1 1 8 10" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M872 268 l4-8 4 8" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <text x="876" y="310" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">repeats</text>

  <!-- cycle arrows -->
  <path d="M1038 188 c52 8 88 44 96 88" stroke="#f87171" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M1168 292 c-8 52-44 88-88 96" stroke="#f87171" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M1080 432 c-52-8-96-44-104-88" stroke="#f87171" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M948 432 c-44-44-44-96 0-140" stroke="#f87171" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M900 228 c-20-44 8-88 56-96" stroke="#f87171" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- hand off to you -->
  <path d="M876 292 H760" stroke="#fca5a5" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-red-light)"/>
  <rect x="668" y="318" width="88" height="48" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="712" y="348" text-anchor="middle" fill="#b91c1c" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">hand off</text>
  <text x="712" y="362" text-anchor="middle" fill="#dc2626" font-family="Inter, system-ui, sans-serif" font-size="10">when stuck</text>

  <text x="892" y="510" text-anchor="middle" fill="#991b1b" font-family="Inter, system-ui, sans-serif" font-size="14">The system pokes agents. You review and design.</text>

  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f97316"/>
    </marker>
    <marker id="arrow-orange-light" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fdba74"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-red-light" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fca5a5"/>
    </marker>
  </defs>
</svg>
